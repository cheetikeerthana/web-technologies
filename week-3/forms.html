<html>
    <body bgcolor="grey" align="center">
      <form action="sucess.html">
        <b>
          <h3>Registration Form</h3>
          <table align="center">
           <b>
            <tr>
                <td>Name:</td>
                <td><input type="text" placeholder="Enter your name" required></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td><input type="radio" name="gender" required>Male<br>
                <input type="radio" name="gender" required>Female<br>
                <input type="radio" name="gender">Other</td>
            </tr>
            <tr>
                <td>Languages Known:</td>
                <td><input type="checkbox" name="languages"> English<br>
                <input type="checkbox" name="languages"> Spanish<br>
                <input type="checkbox" name="languages"> French</td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email" placeholder="Enter your email" required></td>
            </tr>
            <tr>
                <td>Mobile Number:</td>
                <td><input type="text" placeholder="Enter your mobile number" required></td>
            </tr>
            <tr>
                <td>Address:</td>
                <td><textarea rows="5" cols="10" placeholder="Enter your permanent address" required></textarea></td>
            </tr>
            <tr>
                <td>Job Location:</td>
                <td>
                    <select>
                        <option>Hyderabad</option>
                        <option>Bangalore</option>
                        <option>Chennai</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Upload Resume:</td>
                <td><input type="file" accept=".pdf"></td>
            </tr>
            <tr>
                <td>Reset</td>
                <td><input type="reset"><br><input type="submit"></td>
            </tr>
            </b>
        </table>
        </b>
      </form>  

    </body>
</html>
