<!DOCTYPE html>
<html>
<head>
    <style>
        .gallery {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 30px;
            scroll-behavior: smooth;
        }

        .gallery img {
            width: 500px;
            height: 450px;
            object-fit: cover;
            border-radius: 20px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<h2>Image Gallery</h2>

<div class="gallery">
    <img src="cafe.webp" alt="Image 1">
    <img src="image2.jpg" alt="Image 2">
    <img src="image3.jpg" alt="Image 3">
    <img src="image4.jpg" alt="Image 4">
    
</div>

</body>
</html>
